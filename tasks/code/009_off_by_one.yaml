id: "code/009"
domain: "code"
description: >
  The function `cumulative_sum` below is supposed to return a list
  whose i-th element is the sum of the input from index 0 to index i
  inclusive, e.g. cumulative_sum([1, 2, 3]) = [1, 3, 6]. It currently
  has an off-by-one error and an out-of-range bug. Fix the function so
  the example above returns the correct list. Provide only the
  corrected function.
tools_available:
  - run_python
expected_output: |
  def cumulative_sum(numbers: list[int]) -> list[int]:
      result = []
      total = 0
      for n in numbers:
          total += n
          result.append(total)
      return result
optimal_steps: 2
difficulty: "medium"
tags:
  - bugfix
  - python
context: |
  def cumulative_sum(numbers: list[int]) -> list[int]:
      result = []
      for i in range(len(numbers) + 1):
          result.append(sum(numbers[: i + 1]))
      return result
