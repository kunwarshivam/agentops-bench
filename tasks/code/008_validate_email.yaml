id: "code/008"
domain: "code"
description: >
  Write a Python function `is_valid_email(s: str) -> bool` that returns
  True when `s` matches the regular expression
  `^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$` and False
  otherwise. Use the `re` module and `re.fullmatch`. Provide only the
  function definition.
tools_available:
  - run_python
expected_output: |
  import re

  def is_valid_email(s: str) -> bool:
      return re.fullmatch(r"^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$", s) is not None
optimal_steps: 1
difficulty: "easy"
tags:
  - regex
  - python
