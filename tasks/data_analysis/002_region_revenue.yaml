id: "data_analysis/002"
domain: "data_analysis"
description: >
  Use the query_database tool against the orders table to find which region
  had the largest total revenue (sum of amount_usd) across all quarters.
  Report the result in a single sentence of the form:
  "The <region> region had the largest total revenue at $<value>."
  Use a whole-dollar value (no decimal points, no thousands separator).
tools_available:
  - query_database
expected_output: "The East region had the largest total revenue at $53200."
optimal_steps: 2
difficulty: "easy"
tags:
  - sql
  - aggregation
