id: "tool_use/003"
domain: "tool_use"
description: >
  Compute year-to-date (YTD) returns and identify the best-performing stock.

  January 1, 2026 prices:
  - AAPL: $185.00
  - GOOGL: $140.00
  - MSFT: $375.00

  Current prices (April 2026):
  - AAPL: $210.50
  - GOOGL: $165.20
  - MSFT: $420.00

  Use the calculate tool to compute each stock's YTD return as a percentage,
  rounded to two decimal places. State all three percentages and clearly name
  the best-performing stock.
tools_available:
  - calculate
expected_output: |
  AAPL YTD: 13.78%
  GOOGL YTD: 18.00%
  MSFT YTD: 12.00%
  Winner: GOOGL
optimal_steps: 4
difficulty: "medium"
tags:
  - finance
  - calculation
  - multi-step
